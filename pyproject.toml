[tool.uv.workspace]
members = ["python"]

[tool.uv]
index-url = "https://pypi.org/simple"
prerelease = "allow"
index-strategy = "unsafe-best-match"
keyring-provider = "subprocess"
default-groups = ["dev"]
required-version = ">=0.9.0"

# Dev tooling lives at workspace root because it's used across all members and
# scripts, not specific to the `coreai-models` package itself.
[dependency-groups]
test = [
    "pytest==8.4.0",
    "pytest-asyncio==0.24.0",
    "pytest-cov==7.1.0",
    "pytest-rerunfailures==15.1",
    "pytest-xdist==3.6.1",
]
lint = [
    "ruff==0.15.12",
    "mypy==1.14.1",
]
dev = [
    {include-group = "test"},
    {include-group = "lint"},
]
